// Override control points for specific roads that need custom curves
const curveOverrides = {
  'forecast_rf→forecast_actuals': {cx:420, cy:240},
};
function getRoadCurve(a,b){
  const src=nodeMap[a],dst=nodeMap[b];
  const sx=src.cx,sy=src.cy,dx=dst.cx,dy=dst.cy;
  const key=a+'→'+b;
  const ovr=curveOverrides[key]||curveOverrides[b+'→'+a];
  if(ovr) return{sx,sy,dx,dy,cx:ovr.cx,cy:ovr.cy};
  const mx=(sx+dx)/2,my=(sy+dy)/2;
  const off=10*Math.sin(Math.atan2(dy-sy,dx-sx)+Math.PI/2);
  return{sx,sy,dx,dy,cx:mx+off,cy:my+off};
}

// --- Bus-to-sedan split car for grain changes ---
const splitPoint = 0.45;
const countries = [
  {code:'DE',color:pillColors.Country.bg,text:pillColors.Country.text},

class SplitCar{
  constructor(road,offset){
    this.road=road;
    this.progress=offset;
    this.speed=0.0012+Math.random()*0.0006;
    this.burstTimer=0;
  }
  update(){
    this.progress+=this.speed;
    if(this.progress>1){this.progress=0;this.burstTimer=0;}
    if(this.progress>=splitPoint && this.burstTimer===0) this.burstTimer=1;
    if(this.burstTimer>0 && this.burstTimer<30) this.burstTimer++;
  }
  draw(){
    const c=getRoadCurve(this.road[0],this.road[1]);
    const t=this.progress;
    const x=(1-t)*(1-t)*c.sx+2*(1-t)*t*c.cx+t*t*c.dx;
    const y=(1-t)*(1-t)*c.sy+2*(1-t)*t*c.cy+t*t*c.dy;
    const ttx=2*(1-t)*(c.cx-c.sx)+2*t*(c.dx-c.cx);
    const tty=2*(1-t)*(c.cy-c.sy)+2*t*(c.dy-c.cy);
    const angle=Math.atan2(tty,ttx);

    if(t<splitPoint){
      drawDualBus(x,y,angle,'ASIN','Region');
    } else {
      const postT=(t-splitPoint)/(1-splitPoint);
      drawCountrySedans(x,y,angle,postT,'ASIN');

      if(this.burstTimer>0 && this.burstTimer<20){
        const splitX=(1-splitPoint)*(1-splitPoint)*c.sx+2*(1-splitPoint)*splitPoint*c.cx+splitPoint*splitPoint*c.dx;
        const splitY=(1-splitPoint)*(1-splitPoint)*c.sy+2*(1-splitPoint)*splitPoint*c.cy+splitPoint*splitPoint*c.dy;
        const alpha=Math.max(0,1-this.burstTimer/20);
        ctx.globalAlpha=alpha*0.6;
        for(let i=0;i<6;i++){
          const a2=i*Math.PI/3+this.burstTimer*0.1;
          const r=this.burstTimer*1.2;
          ctx.fillStyle=pillColors.Region.text;
          ctx.beginPath();ctx.arc(splitX+Math.cos(a2)*r,splitY+Math.sin(a2)*r,1.5,0,Math.PI*2);ctx.fill();
        }
        ctx.globalAlpha=1;
      }
    }
  }
}

// --- Paint Booth system ---
const boothW=20, boothH=16;

function drawBoothAt(road, t_mid, label, entryColor, exitColor, targetGrain){
  targetGrain=targetGrain||'ASIN';
  const tg=pillColors[targetGrain];
  const c=getRoadCurve(road[0],road[1]);
  const bx=(1-t_mid)*(1-t_mid)*c.sx+2*(1-t_mid)*t_mid*c.cx+t_mid*t_mid*c.dx;
  const by=(1-t_mid)*(1-t_mid)*c.sy+2*(1-t_mid)*t_mid*c.cy+t_mid*t_mid*c.dy;
  const ttx=2*(1-t_mid)*(c.cx-c.sx)+2*t_mid*(c.dx-c.cx);
  const tty=2*(1-t_mid)*(c.cy-c.sy)+2*t_mid*(c.dy-c.cy);
  const angle=Math.atan2(tty,ttx);
  ctx.save();ctx.translate(bx,by);ctx.rotate(angle);
  // Booth body — tinted to target grain
  ctx.fillStyle=tg.bg;ctx.globalAlpha=isDark?0.7:0.85;
  ctx.beginPath();ctx.roundRect(-boothW/2,-boothH,boothW,boothH*2,3);ctx.fill();
  ctx.globalAlpha=1;
  ctx.strokeStyle=tg.text;ctx.lineWidth=1.5;ctx.globalAlpha=0.6;
  ctx.beginPath();ctx.roundRect(-boothW/2,-boothH,boothW,boothH*2,3);ctx.stroke();
  ctx.globalAlpha=1;
  // Chevrons
  ctx.strokeStyle=entryColor;ctx.lineWidth=1;ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.moveTo(-boothW/2,-boothH+4);ctx.lineTo(-boothW/2+4,-boothH+8);ctx.lineTo(-boothW/2,-boothH+12);ctx.stroke();
  ctx.strokeStyle=exitColor;
  ctx.beginPath();ctx.moveTo(boothW/2,-boothH+4);ctx.lineTo(boothW/2-4,-boothH+8);ctx.lineTo(boothW/2,-boothH+12);ctx.stroke();
  ctx.globalAlpha=1;
  // Label
  ctx.fillStyle=tg.text;ctx.font='bold 5px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,0,0);
  ctx.restore();
}

function drawBus(x,y,angle,grain){
  const gc=pillColors[grain];
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=gc.bg;
  ctx.beginPath();ctx.roundRect(-10,-5,20,10,2);ctx.fill();
  ctx.strokeStyle=gc.text;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.roundRect(-10,-5,20,10,2);ctx.stroke();
  ctx.fillStyle=gc.text;ctx.font='bold 6px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(grain,0,0);
  ctx.restore();
}

function drawDualBus(x,y,angle,grainLeft,grainRight){
  const gl=pillColors[grainLeft], gr=pillColors[grainRight];
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  // Full shape clip
  ctx.save();
  ctx.beginPath();ctx.roundRect(-14,-5,28,10,2);ctx.clip();
  // Left half fill
  ctx.fillStyle=gl.bg;
  ctx.fillRect(-14,-5,14,10);
  // Right half fill
  ctx.fillStyle=gr.bg;
  ctx.fillRect(0,-5,14,10);
  ctx.restore();
  // Full outline
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.2)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.roundRect(-14,-5,28,10,2);ctx.stroke();
  // Divider
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.08)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(0,4);ctx.stroke();
  // Labels
  ctx.font='bold 5px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=gl.text;ctx.fillText(grainLeft,-7,0);
  ctx.fillStyle=gr.text;ctx.fillText(grainRight,7,0);
  ctx.restore();
}

function drawSparkles(x,y,sparkT,color1,color2){
  for(let i=0;i<4;i++){
    const sa=i*Math.PI*2/4+sparkT*Math.PI;
    const sr=6+Math.sin(sparkT*Math.PI*3+i)*3;
    ctx.globalAlpha=0.5+Math.sin(sparkT*Math.PI)*0.3;
    ctx.fillStyle=i%2===0?color1:color2;
    ctx.beginPath();ctx.arc(x+Math.cos(sa)*sr,y+Math.sin(sa)*sr,1.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawMiniDual(x,y,angle,prodGrain,geoLabel,geoType){
  geoType=geoType||'Country';
  const pl=pillColors[prodGrain], pr=pillColors[geoType];
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.save();
  ctx.beginPath();ctx.roundRect(-9,-3.5,18,7,1.5);ctx.clip();
  ctx.fillStyle=pl.bg;ctx.fillRect(-9,-3.5,9,7);
  ctx.fillStyle=pr.bg;ctx.fillRect(0,-3.5,9,7);
  ctx.restore();
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.15)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.roundRect(-9,-3.5,18,7,1.5);ctx.stroke();
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.06)';ctx.lineWidth=0.4;
  ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(0,3);ctx.stroke();
  ctx.font='bold 4px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=pl.text;ctx.fillText(prodGrain,-4.5,0);
  ctx.fillStyle=pr.text;ctx.fillText(geoLabel,4.5,0);
  ctx.restore();
}

function drawCountrySedans(x,y,angle,postT,prodGrain){
  prodGrain=prodGrain||'ASIN';
  const perpX=Math.cos(angle+Math.PI/2);
  const perpY=Math.sin(angle+Math.PI/2);
  const spreadT=Math.min(postT*2,1);
  const ease=1-Math.pow(1-spreadT,3);
  const maxSpread=14;
  countries.forEach((ct,i)=>{
    const lane=(i-1.5)*maxSpread*ease/(countries.length-1);
    const sx=x+perpX*lane;
    const sy=y+perpY*lane;
    drawMiniDual(sx,sy,angle,prodGrain,ct.code);
  });
}

function getPosAngle(road,t){
  const c=getRoadCurve(road[0],road[1]);
  const x=(1-t)*(1-t)*c.sx+2*(1-t)*t*c.cx+t*t*c.dx;
  const y=(1-t)*(1-t)*c.sy+2*(1-t)*t*c.cy+t*t*c.dy;
  const ttx=2*(1-t)*(c.cx-c.sx)+2*t*(c.dx-c.cx);
  const tty=2*(1-t)*(c.cy-c.sy)+2*t*(c.dy-c.cy);
  return{x,y,angle:Math.atan2(tty,ttx)};
}

// --- UB Legacy: single booth (Region→Country) ---
// Phases: [0, b1_entry) EU bus | [b1_entry, b1_exit) sparkle | [b1_exit, 1] country sedans
const ub_b1_entry=0.35, ub_b1_exit=0.50;

class UBBoothCar{
  constructor(road,offset){
    this.road=road;this.progress=offset;this.speed=0.0012+Math.random()*0.0005;
  }
  update(){this.progress+=this.speed;if(this.progress>1)this.progress=0;}
  draw(){
    const t=this.progress;
    const p=getPosAngle(this.road,t);
    if(t<ub_b1_entry){
      drawDualBus(p.x,p.y,p.angle,'ASIN','Region');
    } else if(t<ub_b1_exit){
      drawSparkles(p.x,p.y,(t-ub_b1_entry)/(ub_b1_exit-ub_b1_entry),pillColors.Region.text,pillColors.Country.text);
    } else {
      drawCountrySedans(p.x,p.y,p.angle,(t-ub_b1_exit)/(1-ub_b1_exit),'ASIN');
    }
  }
}

// --- Sidecar system for JOIN enrichment ---
const mergePoint = 0.4;
const feederLeadUp = 0.25; // feeder starts when main car is at (mergePoint - feederLeadUp)

function getMergeXYForRoad(src,dst,mp_t){
  const t=mp_t||mergePoint;
  const c=getRoadCurve(src,dst);
  return {
    x:(1-t)*(1-t)*c.sx+2*(1-t)*t*c.cx+t*t*c.dx,
    y:(1-t)*(1-t)*c.sy+2*(1-t)*t*c.cy+t*t*c.dy
  };
}

class SidecarCar{
  constructor(road,offset,mainGrain,geoGrain,sidecarGrain){
    this.road=road;
    this.progress=offset;
    this.speed=0.0012+Math.random()*0.0005;
    this.snapTimer=0;
    this.mainGrain=mainGrain;
    this.geoGrain=geoGrain;
    this.sidecarGrain=sidecarGrain;
  }
  update(){
    this.progress+=this.speed;
    if(this.progress>1){this.progress=0;this.snapTimer=0;}
    if(this.progress>=mergePoint && this.snapTimer===0) this.snapTimer=1;
    if(this.snapTimer>0 && this.snapTimer<25) this.snapTimer++;
  }
  draw(){
    const mc=pillColors[this.mainGrain];
    const sc=pillColors[this.sidecarGrain];
    const c=getRoadCurve(this.road[0],this.road[1]);
    const t=this.progress;
    const x=(1-t)*(1-t)*c.sx+2*(1-t)*t*c.cx+t*t*c.dx;
    const y=(1-t)*(1-t)*c.sy+2*(1-t)*t*c.cy+t*t*c.dy;
    const ttx=2*(1-t)*(c.cx-c.sx)+2*t*(c.dx-c.cx);
    const tty=2*(1-t)*(c.cy-c.sy)+2*t*(c.dy-c.cy);
    const angle=Math.atan2(tty,ttx);
    const perpX=Math.cos(angle+Math.PI/2);
    const perpY=Math.sin(angle+Math.PI/2);

    // Main car (always visible) — dual tone
    drawDualBus(x,y,angle,this.mainGrain,this.geoGrain);

    // --- Feeder car: synced approach from ERP ---
    const feederStart = mergePoint - feederLeadUp;
    if(t >= feederStart && t < mergePoint){
      const feederT = (t - feederStart) / feederLeadUp; // 0→1 as main approaches merge
      const erp = nodeMap['erp'];
      const mp = getMergeXYForRoad(this.road[0], this.road[1]);
      const fx = erp.cx + (mp.x - erp.cx) * feederT;
      const fy = erp.cy + (mp.y - erp.cy) * feederT;
      const fAngle = Math.atan2(mp.y - erp.cy, mp.x - erp.cx);

      ctx.globalAlpha = 0.7;
      ctx.save();ctx.translate(fx,fy);ctx.rotate(fAngle);
      ctx.fillStyle=sc.bg;
      ctx.beginPath();ctx.roundRect(-5,-3,10,6,1.5);ctx.fill();
      ctx.strokeStyle=sc.text;ctx.lineWidth=0.4;
      ctx.beginPath();ctx.roundRect(-5,-3,10,6,1.5);ctx.stroke();
      ctx.fillStyle=sc.text;ctx.font='bold 4px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this.sidecarGrain,0,0);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // --- Sidecar attached phase ---
    if(t>=mergePoint){
      const attachT=Math.min(this.snapTimer/15,1);
      const ease=1-Math.pow(1-attachT,3);
      const slideStart=18;
      const slideEnd=7;
      const offset=slideStart-(slideStart-slideEnd)*ease;

      const scx=x-perpX*offset;
      const scy=y-perpY*offset;

      ctx.save();ctx.translate(scx,scy);ctx.rotate(angle);
      ctx.fillStyle=sc.bg;
      ctx.beginPath();ctx.roundRect(-6,-3.5,12,7,2);ctx.fill();
      ctx.strokeStyle=sc.text;ctx.lineWidth=0.6;
      ctx.beginPath();ctx.roundRect(-6,-3.5,12,7,2);ctx.stroke();
      ctx.fillStyle=sc.text;ctx.font='bold 5px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this.sidecarGrain,0,0);
      ctx.restore();

      if(this.snapTimer>0 && this.snapTimer<12){
        const alpha=Math.max(0,1-this.snapTimer/12)*0.5;
        ctx.globalAlpha=alpha;
        ctx.fillStyle=sc.text;
        ctx.beginPath();ctx.arc(x-perpX*slideEnd,y-perpY*slideEnd,6-this.snapTimer*0.3,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      }
    }
  }
}

const sp_compact_entry=0.18, sp_compact_exit=0.30;
const sp_merge=0.50;

class SalesPOVCar{
  constructor(road,offset){
    this.road=road;this.progress=offset;
    this.speed=0.0010+Math.random()*0.0004;
    this.snapTimer=0;
  }
  update(){
    this.progress+=this.speed;
    if(this.progress>1){this.progress=0;this.snapTimer=0;}
    if(this.progress>=sp_merge && this.snapTimer===0) this.snapTimer=1;
    if(this.snapTimer>0 && this.snapTimer<25) this.snapTimer++;
  }
  draw(){
    const t=this.progress;
    const p=getPosAngle(this.road,t);
    const perpX=Math.cos(p.angle+Math.PI/2);
    const perpY=Math.sin(p.angle+Math.PI/2);

    if(t<sp_compact_entry){
      // --- Country sedans converging toward booth (dual-tone: ASIN|Country) ---
      const convergeT=1-t/sp_compact_entry;
      const ease=1-Math.pow(1-convergeT,2);
      const maxSpread=14;
      countries.forEach((ct,i)=>{
        const lane=(i-1.5)*maxSpread*ease/(countries.length-1);
        const sx=p.x+perpX*lane;
        const sy=p.y+perpY*lane;
        drawMiniDual(sx,sy,p.angle,'ASIN',ct.code);
      });
    } else if(t<sp_compact_exit){
      // --- Inside compactor: sparkles ---
      drawSparkles(p.x,p.y,(t-sp_compact_entry)/(sp_compact_exit-sp_compact_entry),pillColors.Country.text,pillColors.Region.text);
    } else {
      // --- Post-compactor: ASIN|Region dual bus ---
      drawDualBus(p.x,p.y,p.angle,'ASIN','Region');

      // --- Feeder from ERP (synced) ---
      const feederStart=sp_merge-feederLeadUp;
      if(t>=feederStart && t<sp_merge){
        const feederT=(t-feederStart)/feederLeadUp;
        const erp=nodeMap['erp'];
        const mp=getMergeXYForRoad(this.road[0],this.road[1],sp_merge);
        const fx=erp.cx+(mp.x-erp.cx)*feederT;
        const fy=erp.cy+(mp.y-erp.cy)*feederT;
        const fAngle=Math.atan2(mp.y-erp.cy,mp.x-erp.cx);
        ctx.globalAlpha=0.7;
        ctx.save();ctx.translate(fx,fy);ctx.rotate(fAngle);
        ctx.fillStyle=pillColors.USIN.bg;
        ctx.beginPath();ctx.roundRect(-5,-3,10,6,1.5);ctx.fill();
        ctx.strokeStyle=pillColors.USIN.text;ctx.lineWidth=0.4;
        ctx.beginPath();ctx.roundRect(-5,-3,10,6,1.5);ctx.stroke();
        ctx.fillStyle=pillColors.USIN.text;ctx.font='bold 4px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('USIN',0,0);
        ctx.restore();
        ctx.globalAlpha=1;
      }

      // --- USIN sidecar attached ---
      if(t>=sp_merge){
        const attachT=Math.min(this.snapTimer/15,1);
        const ease=1-Math.pow(1-attachT,3);
        const slideStart=18,slideEnd=7;
        const offset=slideStart-(slideStart-slideEnd)*ease;
        const scx=p.x-perpX*offset;
        const scy=p.y-perpY*offset;
        ctx.save();ctx.translate(scx,scy);ctx.rotate(p.angle);
        ctx.fillStyle=pillColors.USIN.bg;
        ctx.beginPath();ctx.roundRect(-6,-3.5,12,7,2);ctx.fill();
        ctx.strokeStyle=pillColors.USIN.text;ctx.lineWidth=0.6;
        ctx.beginPath();ctx.roundRect(-6,-3.5,12,7,2);ctx.stroke();
        ctx.fillStyle=pillColors.USIN.text;ctx.font='bold 5px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('USIN',0,0);
        ctx.restore();
        if(this.snapTimer>0 && this.snapTimer<12){
          const alpha=Math.max(0,1-this.snapTimer/12)*0.5;
          ctx.globalAlpha=alpha;
          ctx.fillStyle=pillColors.USIN.text;
          ctx.beginPath();ctx.arc(p.x-perpX*slideEnd,p.y-perpY*slideEnd,6-this.snapTimer*0.3,0,Math.PI*2);ctx.fill();
          ctx.globalAlpha=1;
        }
      }
    }
  }
}

function drawRiver(){
  ctx.save();
  // Main river (vertical, right side)
  ctx.beginPath();
  ctx.moveTo(515,0);ctx.bezierCurveTo(491,117,538,234,503,351);
  ctx.bezierCurveTo(468,468,526,585,491,702);ctx.bezierCurveTo(475,790,500,860,491,900);
  ctx.lineTo(532,900);ctx.bezierCurveTo(541,860,516,790,532,702);
  ctx.bezierCurveTo(567,585,509,468,544,351);ctx.bezierCurveTo(579,234,532,117,556,0);
  ctx.closePath();ctx.fillStyle=riverColor;ctx.fill();
  ctx.strokeStyle=riverStroke;ctx.lineWidth=1;ctx.stroke();
  ctx.strokeStyle=riverStroke;ctx.lineWidth=0.5;
  for(let wy=30;wy<900;wy+=40){const wx=523+10*Math.sin(wy*0.01);
    ctx.beginPath();ctx.moveTo(wx-8,wy);ctx.quadraticCurveTo(wx,wy-4,wx+8,wy);ctx.stroke();}

  // Canal: straight line from Forecast UB Legacy → Forecast Redfits → DTC Island
  const cw=12; // canal half-width
  // Forecast UB Legacy center ~(52,487), Forecast Redfits center ~(67,287), Island shore ~(280,165)
  // Two straight segments with perpendicular offsets for width
  const segs=[
    {x1:52, y1:495, x2:67, y2:280},  // UB Legacy → Redfits
    {x2:280, y2:165}                   // Redfits → Island (continuation)
  ];
  // Segment 1: UB Legacy to Redfits
  const s1={x1:52,y1:495,x2:67,y2:280};
  const a1=Math.atan2(s1.y2-s1.y1,s1.x2-s1.x1);
  const px1=Math.cos(a1+Math.PI/2)*cw, py1=Math.sin(a1+Math.PI/2)*cw;
  // Segment 2: Redfits to Island
  const s2={x1:67,y1:280,x2:280,y2:165};
  const a2=Math.atan2(s2.y2-s2.y1,s2.x2-s2.x1);
  const px2=Math.cos(a2+Math.PI/2)*cw, py2=Math.sin(a2+Math.PI/2)*cw;

  ctx.beginPath();
  // Right bank
  ctx.moveTo(s1.x1+px1, s1.y1+py1);
  ctx.lineTo(s1.x2+px1, s1.y2+py1);
  ctx.lineTo(s2.x2+px2, s2.y2+py2);
  // Left bank (return)
  ctx.lineTo(s2.x1-px2, s2.y1-py2);
  ctx.lineTo(s1.x1-px1, s1.y1-py1);
  ctx.closePath();
  ctx.fillStyle=riverColor;ctx.fill();
  ctx.strokeStyle=riverStroke;ctx.lineWidth=1;ctx.stroke();

  // Canal wavelets along centerline
  ctx.strokeStyle=riverStroke;ctx.lineWidth=0.5;
  for(let i=0;i<10;i++){
    const t=i/9;
    let wx,wy;
    if(t<0.5){const st=t/0.5;wx=s1.x1+(s1.x2-s1.x1)*st;wy=s1.y1+(s1.y2-s1.y1)*st;}
    else{const st=(t-0.5)/0.5;wx=s2.x1+(s2.x2-s2.x1)*st;wy=s2.y1+(s2.y2-s2.y1)*st;}
    ctx.beginPath();ctx.moveTo(wx-5,wy);ctx.quadraticCurveTo(wx,wy-3,wx+5,wy);ctx.stroke();
  }

  ctx.restore();
}

  for(let i=1;i<5;i++){
    const ty=-7*s*i;const tx=2*s*Math.sin(i*0.5);
    ctx.beginPath();ctx.moveTo(tx-2*s,ty);ctx.lineTo(tx+2*s,ty);ctx.stroke();
  }
  // Fronds
  const frondColor=isDark?'#3B6B20':'#5BA335';
  const frondDark=isDark?'#2A5015':'#4A8A28';
  const topX=-2*s,topY=-35*s;
  const sway=Math.sin(frameCount*0.015+x*0.1)*3*s;
  for(let f=0;f<5;f++){
    const angle=-Math.PI*0.8+f*Math.PI*0.4;
    const len=18*s+Math.sin(f*1.5)*4*s;
    const endX=topX+Math.cos(angle)*len+sway;
    const endY=topY+Math.sin(angle)*len*0.6;
    const cpX=topX+Math.cos(angle)*len*0.5+sway*0.5;
    const cpY=topY+Math.sin(angle)*len*0.2-5*s;
    ctx.strokeStyle=f%2===0?frondColor:frondDark;
    ctx.lineWidth=2*s;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(topX,topY);ctx.quadraticCurveTo(cpX,cpY,endX,endY);ctx.stroke();
    // Leaf lines
    ctx.lineWidth=0.8*s;
    for(let l=0.3;l<0.9;l+=0.2){
      const lx=(1-l)*(1-l)*topX+2*(1-l)*l*cpX+l*l*endX;
      const ly=(1-l)*(1-l)*topY+2*(1-l)*l*cpY+l*l*endY;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+3*s*(f<2.5?-1:1),ly+3*s);ctx.stroke();
    }
  }
  // Coconuts
  ctx.fillStyle=isDark?'#5C4020':'#8B6B3D';
  ctx.beginPath();ctx.arc(topX-2*s,topY+3*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(topX+2*s,topY+4*s,1.8*s,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBuilding(l){
  const dim = l.dim;
  // Stacked card effect
  if(l.stacked){
    for(let i=2;i>=1;i--){
      ctx.fillStyle=stackShadow;
      ctx.fillRect(l.x+i*4,l.y-i*4,l.w,l.h);
      ctx.fillStyle=dim?l.color:l.color;
      ctx.globalAlpha=dim?0.3:0.6;
      ctx.fillRect(l.x+i*4,l.y-i*4,l.w,l.h);
      ctx.strokeStyle=l.accent;ctx.lineWidth=1;ctx.globalAlpha=dim?0.3:0.5;
      ctx.strokeRect(l.x+i*4,l.y-i*4,l.w,l.h);
      ctx.globalAlpha=1;
    }
  }

  ctx.globalAlpha=dim?0.4:1;

  if(l.tableau){
    // --- Dashboard screen style ---
    const tx=l.x, ty=l.y, tw=l.w, th=l.h;
    const titleH=10;
    const r=4; // corner radius

    // Monitor glow
    ctx.save();
    ctx.shadowColor=isDark?'rgba(180,210,255,0.25)':'rgba(100,140,200,0.15)';
    ctx.shadowBlur=12;
    ctx.fillStyle=isDark?'#2a2d33':'#ffffff';
    ctx.beginPath();ctx.roundRect(tx,ty,tw,th,r);ctx.fill();
    ctx.restore();

    // Border
    ctx.strokeStyle=isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.12)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(tx,ty,tw,th,r);ctx.stroke();

    // Title bar
    ctx.fillStyle=isDark?'#383b42':'#f0f0f2';
    ctx.beginPath();ctx.roundRect(tx,ty,tw,titleH,[r,r,0,0]);ctx.fill();
    // Title bar dots
    ctx.fillStyle='#FF5F57';ctx.beginPath();ctx.arc(tx+7,ty+titleH/2,1.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFBD2E';ctx.beginPath();ctx.arc(tx+13,ty+titleH/2,1.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#28C840';ctx.beginPath();ctx.arc(tx+19,ty+titleH/2,1.8,0,Math.PI*2);ctx.fill();

    // Content area
    const contentX=tx+6, contentY=ty+titleH+4, cw=tw-12, ch=th-titleH-8;

    // Mini bar chart (left side)
    const barW=4, barGap=2.5;
    const barColors=['#4E79A7','#E15759','#F28E2B','#59A14F','#EDC948','#76B7B2'];
    const barHeights=[0.7,0.45,0.85,0.55,0.65,0.4];
    const barAreaW=cw*0.45;
    const barX=contentX+2;
    for(let i=0;i<6;i++){
      const bh=barHeights[i]*(ch-8);
      ctx.fillStyle=barColors[i];
      ctx.globalAlpha=0.85;
      ctx.fillRect(barX+i*(barW+barGap), contentY+ch-4-bh, barW, bh);
    }
    ctx.globalAlpha=1;

    // Mini line chart (right side)
    const lineX=contentX+barAreaW+6, lineW=cw-barAreaW-8;
    const pts=[0.6,0.35,0.7,0.45,0.8,0.5,0.75];
    ctx.strokeStyle='#4E79A7';ctx.lineWidth=1.2;
    ctx.beginPath();
    pts.forEach((p,i)=>{
      const px=lineX+i*(lineW/(pts.length-1));
      const py=contentY+ch-4-p*(ch-10);
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.stroke();
    // Second line
    const pts2=[0.3,0.5,0.4,0.6,0.55,0.7,0.65];
    ctx.strokeStyle='#E15759';ctx.lineWidth=1;
    ctx.beginPath();
    pts2.forEach((p,i)=>{
      const px=lineX+i*(lineW/(pts2.length-1));
      const py=contentY+ch-4-p*(ch-10);
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.stroke();

    // Tableau logo (small, bottom-right corner)
    const logoS=2.2;
    const lx=tx+tw-14, ly=ty+th-12;
    const tCross=(cx2,cy2,color,sz)=>{
      ctx.fillStyle=color;
      ctx.fillRect(cx2-sz*0.3,cy2-sz,sz*0.6,sz*2);
      ctx.fillRect(cx2-sz,cy2-sz*0.3,sz*2,sz*0.6);
    };
    const lsp=logoS*1.8;
    ctx.globalAlpha=0.7;
    tCross(lx-lsp*0.4,ly-lsp*0.5,'#4574A7',logoS*0.5);
    tCross(lx+lsp*0.4,ly-lsp*0.5,'#E8743B',logoS*0.5);
    tCross(lx-lsp*0.4,ly+lsp*0.5,'#A0CBE8',logoS*0.5);
    tCross(lx+lsp*0.4,ly+lsp*0.5,'#59A14F',logoS*0.5);
    ctx.globalAlpha=1;

  } else {
    // Standard building
    ctx.fillStyle=l.color;ctx.fillRect(l.x,l.y,l.w,l.h);
    ctx.strokeStyle=l.accent;ctx.lineWidth=1.5;ctx.strokeRect(l.x,l.y,l.w,l.h);
    const winW=6,winH=5,gap=4;
    const cols=Math.floor((l.w-gap*2)/(winW+gap));const rows=Math.floor((l.h-gap*2)/(winH+gap));
    const sx=l.x+(l.w-cols*(winW+gap)+gap)/2;const sy=l.y+(l.h-rows*(winH+gap)+gap)/2;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      ctx.fillStyle=isDark?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.5)';
      ctx.fillRect(sx+c*(winW+gap),sy+r*(winH+gap),winW,winH);
    }
  }
  ctx.globalAlpha=1;
}

  const lines = l.label.split('\n');
  ctx.font='600 9px sans-serif';const pg=4;
  const pw2=l.grains.map(g=>ctx.measureText(g).width+10);
  const prw=pw2.length>0?(pw2.reduce((a,b)=>a+b,0)+(l.grains.length-1)*pg):0;

  // Measure widest line
  ctx.font=lf;
  const maxLineW = Math.max(...lines.map(ln=>ctx.measureText(ln).width));
  const pw=Math.max(maxLineW+12,prw+12);
  const lineH = 14;

  const ph = lines.length * lineH + 4 + grainH;
  const px=cx-pw/2;const py=sy+10;

  ctx.fillStyle=signBg;ctx.strokeStyle=signBorder;ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(px,py,pw,ph,5);ctx.fill();ctx.stroke();
  ctx.fillStyle=textMain;ctx.font=lf;ctx.textAlign='center';ctx.textBaseline='top';
  lines.forEach((ln,i)=>{
    ctx.fillText(ln,cx,py+3+i*lineH);
  });

  if(l.grains.length > 0){
    const pillY=py+lines.length*lineH+4;
    let pillX=cx-prw/2;
    l.grains.forEach((g,i)=>{const w=pw2[i];drawPill(g,pillX+w/2,pillY,pillColors[g]);pillX+=w+pg;});

  ctx.globalAlpha=1;
}

// --- Rowboat: manual forecast delivery to DTC Island ---
const boatChannels=['SPF','Tiktok','WMT'];

// Canal waypoints matching the drawn canal segments
const canalFull=[{x:52,y:495},{x:67,y:280},{x:280,y:165}]; // UB Legacy → Redfits bend → Island
const canalFromRF=[{x:67,y:280},{x:280,y:165}]; // Redfits → Island

function getCanalLen(pts){let d=0;for(let i=1;i<pts.length;i++){const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;d+=Math.sqrt(dx*dx+dy*dy);}return d;}
function getCanalPos(pts,t){
  const totalLen=getCanalLen(pts);
  let target=t*totalLen, acc=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;
    const segLen=Math.sqrt(dx*dx+dy*dy);
    if(acc+segLen>=target){const st=(target-acc)/segLen;return{x:pts[i-1].x+dx*st,y:pts[i-1].y+dy*st,angle:Math.atan2(dy,dx)};}
    acc+=segLen;
  }
  const last=pts[pts.length-1],prev=pts[pts.length-2];
  return{x:last.x,y:last.y,angle:Math.atan2(last.y-prev.y,last.x-prev.x)};
}

class Rowboat{
  constructor(offset,srcId){
    this.progress=offset;
    this.speed=0.0012;
    this.channelIdx=Math.floor(Math.random()*boatChannels.length);
    this.srcId=srcId;
    this.path=srcId==='forecast'?canalFull:canalFromRF;
  }
  update(){
    this.progress+=this.speed;
    if(this.progress>1){
      this.progress=0;
      this.channelIdx=(this.channelIdx+1)%boatChannels.length;
    }
  }
  draw(){
    const t=this.progress;
    const p=getCanalPos(this.path,t);
    const x=p.x,y=p.y,angle=p.angle;
    // Bob
    const bob=Math.sin(frameCount*0.08+t*20)*1.5;

    ctx.save();ctx.translate(x,y+bob);ctx.rotate(angle);

    // Wake trail
    ctx.globalAlpha=0.15;
    ctx.fillStyle=isDark?'rgba(60,140,220,0.5)':'rgba(40,120,200,0.3)';
    ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(-14,4);ctx.lineTo(-14,-4);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;

    // Hull
    ctx.fillStyle=isDark?'#6B5030':'#8B6B40';
    ctx.beginPath();
    ctx.moveTo(-8,4);ctx.lineTo(10,4);ctx.lineTo(8,-2);ctx.lineTo(-8,-2);ctx.closePath();
    ctx.fill();
    ctx.strokeStyle=isDark?'#4A3520':'#6B5030';ctx.lineWidth=0.8;ctx.stroke();

    // Channel logo flag
    const ch=boatChannels[this.channelIdx];
    const flagX=2, flagY=-12;
    // Mast
    ctx.strokeStyle=isDark?'#8B7355':'#6B5030';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(flagX,-2);ctx.lineTo(flagX,flagY-6);ctx.stroke();
    // Flag background
    const fw=14,fh=10;
    if(ch==='SPF'){
      // Shopify green flag with white S
      ctx.fillStyle='#95BF47';
      ctx.beginPath();ctx.roundRect(flagX+1,flagY-6,fw,fh,1.5);ctx.fill();
      ctx.strokeStyle='#6E9B2E';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.roundRect(flagX+1,flagY-6,fw,fh,1.5);ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('S',flagX+fw/2+1,flagY-1);
    } else if(ch==='Tiktok'){
      // TikTok black+accent
      ctx.fillStyle='#010101';
      ctx.beginPath();ctx.roundRect(flagX+1,flagY-6,fw,fh,1.5);ctx.fill();
      ctx.fillStyle='#25F4EE';ctx.font='bold 4.5px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('Tik',flagX+fw/2-1,flagY-2);
      ctx.fillStyle='#FE2C55';
      ctx.fillText('Tok',flagX+fw/2+1,flagY+2);
    } else if(ch==='WMT'){
      // Walmart blue flag with yellow spark
      ctx.fillStyle='#0071CE';
      ctx.beginPath();ctx.roundRect(flagX+1,flagY-6,fw,fh,1.5);ctx.fill();
      ctx.strokeStyle='#005BA1';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.roundRect(flagX+1,flagY-6,fw,fh,1.5);ctx.stroke();
      // Simple 6-line spark
      const cx=flagX+fw/2+1,cy=flagY-1;
      ctx.strokeStyle='#FFC220';ctx.lineWidth=1.2;ctx.lineCap='round';
      for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*3.5,cy+Math.sin(a)*3.5);ctx.stroke();}
    }

    // Oar (animated)
    const oarAngle=Math.sin(frameCount*0.1)*0.4;
    ctx.save();ctx.translate(0,0);ctx.rotate(oarAngle);
    ctx.strokeStyle=isDark?'#8B7355':'#6B5030';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(-2,10);ctx.stroke();
    // Oar blade
    ctx.fillStyle=isDark?'#6B5030':'#8B6B40';
    ctx.beginPath();ctx.ellipse(-2,11,1.5,3,0,0,Math.PI*2);ctx.fill();
    ctx.restore();

    ctx.restore();
  }
}
